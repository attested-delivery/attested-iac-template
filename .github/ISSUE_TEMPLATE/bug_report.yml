name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Instantiate with 'copier copy ...'
        2. Run 'tofu validate' in examples/aws
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead, I got...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Minimal Reproducible Configuration
      description: If possible, provide a minimal HCL snippet that reproduces the issue.
      render: hcl
      placeholder: |
        module "labels" {
          source = "../../modules/labels"
          # inputs that trigger the bug
        }

  - type: dropdown
    id: engine
    attributes:
      label: Engine
      options:
        - OpenTofu
        - Terraform
    validations:
      required: true

  - type: input
    id: engine-version
    attributes:
      label: Engine Version
      description: Output of `tofu version` or `terraform version`.
      placeholder: "OpenTofu v1.8.0"
    validations:
      required: true

  - type: dropdown
    id: cloud
    attributes:
      label: Cloud
      description: Which example root / provider is affected?
      options:
        - aws
        - gcp
        - azure
        - module only (cloud-agnostic)
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error messages or stack traces.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this bug has not already been reported.
          required: true
        - label: I have read the documentation.
          required: true
        - label: I am using the latest version of the template.
          required: false
