---
name: Release

# Attested delivery pipeline — Terraform/OpenTofu module template.
#
# Flow: build module tarball → attest-build-provenance → generate + attest
#       CycloneDX SBOM → seam-attest each gate verdict (SAST/SCA/IaC-misconfig/
#       IaC-policy) bound to the tarball digest → OpenVEX → fail-closed verify
#       (gh attestation verify) → tag-gated publish.
#
# The invariant: an artifact reaches consumers ONLY if it is byte-identical to
# what was validated, carries SLSA provenance + SBOM + gate-verdict attestations
# that re-verify at every hop, and publication is fail-closed on that
# verification. A tag publishes nothing unattested.
#
# Dry-run: workflow_dispatch from any branch exercises the full
# build → attest → verify chain; the publish job is tag-gated and skipped.
#
# The "build" job packs a reproducible source tarball (git archive) — the module
# package IS the source tree, so no compile step is needed. Promotion re-verifies
# this exact digest; it never re-archives (build-once-promote-many).

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  meta:
    name: Resolve Metadata
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Resolve artifact name and version
        id: meta
        run: |
          set -euo pipefail
          NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${NAME} ${VERSION}"

  # ---------------------------------------------------------------------------
  # Build: produce a deterministic module tarball from the source tree, attest
  # SLSA build provenance, and expose the subject (name + digest) for the seam.
  # ---------------------------------------------------------------------------
  build:
    name: Build Artifact
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # required for OIDC → Sigstore signing
      attestations: write  # required to write attestation records
    outputs:
      subject-name: ${{ steps.subject.outputs.name }}
      subject-digest: ${{ steps.subject.outputs.digest }}

    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build module tarball
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # The module package is the source tree (HCL needs no compilation).
          git archive \
            --format=tar.gz \
            --prefix="${NAME}-${VERSION}/" \
            -o "dist/${NAME}-${VERSION}.tar.gz" \
            "${GITHUB_SHA}"
          echo "Built: dist/${NAME}-${VERSION}.tar.gz"
          sha256sum dist/*

      - name: Record subject (name + digest) for the attestation seam
        id: subject
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          FILE="${NAME}-${VERSION}.tar.gz"
          DIGEST=$(sha256sum "dist/${FILE}" | cut -d' ' -f1)
          echo "name=${FILE}" >> "$GITHUB_OUTPUT"
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        # v2.4.0
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/*

      - name: Upload build artifact
        # v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # SBOM: generate a CycloneDX SBOM and attest it, binding it to the artifact.
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (generate + attest)
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download build artifacts
        # v4.3.0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM
        # v2.3.0
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/*
          sbom-path: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json

      - name: Upload SBOM artifact
        # v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom
          path: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # SAST (CodeQL, languages: actions) gate + seam. CodeQL has no HCL extractor,
  # so this scans the repo's own workflows; IaC security is Trivy + Checkov.
  # ---------------------------------------------------------------------------
  gate-sast:
    name: Gate — SAST (CodeQL)
    needs: [meta]
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-sast-codeql.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      languages: actions
      build-mode: none

  attest-sast:
    name: Attest — SAST
    needs: [meta, build, gate-sast]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-attest-scan.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://attested-delivery.github.io/attestations/sast/v1
      predicate-artifact: ${{ needs.gate-sast.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sast.outputs.sarif-filename }}

  # ---------------------------------------------------------------------------
  # SCA (OSV) gate + seam.
  # ---------------------------------------------------------------------------
  gate-sca:
    name: Gate — SCA (OSV)
    needs: [meta]
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-sca-osv.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      fail-on-severity: high

  attest-sca:
    name: Attest — SCA
    needs: [meta, build, gate-sca]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-attest-scan.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://attested-delivery.github.io/attestations/sca/v1
      predicate-artifact: ${{ needs.gate-sca.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sca.outputs.sarif-filename }}

  # ---------------------------------------------------------------------------
  # IaC misconfig + license (Trivy filesystem) gate + seam.
  # ---------------------------------------------------------------------------
  gate-trivy:
    name: Gate — Trivy (IaC/license)
    needs: [meta]
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-trivy.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      scan-iac: true

  attest-iac-license:
    name: Attest — IaC/license
    needs: [meta, build, gate-trivy]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-attest-scan.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://attested-delivery.github.io/attestations/iac-license/v1
      predicate-artifact: ${{ needs.gate-trivy.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-trivy.outputs.sarif-filename }}

  # ---------------------------------------------------------------------------
  # IaC policy (Checkov, graph-based) gate + seam. Pinned to the merged
  # reusable-checkov (attested-delivery/.github#7).
  # ---------------------------------------------------------------------------
  gate-checkov:
    name: Gate — Checkov (IaC policy)
    needs: [meta]
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-checkov.yml@8fa29c50d765cedd33a7ed37a82d7075f59b764f
    with:
      directory: .

  attest-iac-policy:
    name: Attest — IaC/policy
    needs: [meta, build, gate-checkov]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-attest-scan.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://attested-delivery.github.io/attestations/iac-policy/v1
      predicate-artifact: ${{ needs.gate-checkov.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-checkov.outputs.sarif-filename }}

  # ---------------------------------------------------------------------------
  # VEX — OpenVEX disposition, self-signed by reusable-vex.yml, bound to subject.
  # ---------------------------------------------------------------------------
  vex:
    name: Gate — VEX (OpenVEX)
    needs: [meta, build]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-vex.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      vex-path: .vex/openvex.json

  # ---------------------------------------------------------------------------
  # Verify: FAIL-CLOSED attestation verification. MUST succeed before publish.
  # Verifies, per artifact: SLSA provenance, SBOM, each seam-signed gate verdict
  # (sast, sca, iac-license, iac-policy), and the self-signed VEX disposition.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Attestations (fail-closed)
    needs: [meta, build, sbom, attest-sast, attest-sca, attest-iac-license, attest-iac-policy, vex]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read

    steps:
      - name: Download all artifacts
        # v4.3.0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-*
          path: all-artifacts
          merge-multiple: true

      - name: Fail-closed attestation verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          SEAM: attested-delivery/.github/.github/workflows/reusable-attest-scan.yml
          VEX_SIGNER: attested-delivery/.github/.github/workflows/reusable-vex.yml
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=()
          for f in all-artifacts/*; do
            case "$f" in
              *-sbom.cdx.json) continue ;;  # the SBOM doc is not a verification subject
              *) artifacts+=("$f") ;;
            esac
          done

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "::error::No artifacts found to verify"
            exit 1
          fi

          echo "Verifying ${#artifacts[@]} artifact(s)..."

          for artifact in "${artifacts[@]}"; do
            echo ""
            echo "=== Verifying: ${artifact} ==="

            echo "  [1/4] Build provenance..."
            gh attestation verify "${artifact}" \
              --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://slsa.dev/provenance/v1"
            echo "  PASS: build provenance"

            echo "  [2/4] SBOM attestation..."
            gh attestation verify "${artifact}" \
              --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://cyclonedx.org/bom"
            echo "  PASS: SBOM attestation"

            # Seam-signed gate verdicts (SLSA L3: signer is the central
            # reusable-attest-scan.yml, so --signer-workflow is required).
            for pt in sast sca iac-license iac-policy; do
              echo "  [3/4] Gate verdict (${pt}, seam)..."
              gh attestation verify "${artifact}" \
                --owner "${OWNER}" \
                --signer-workflow "${SEAM}" \
                --predicate-type "https://attested-delivery.github.io/attestations/${pt}/v1"
              echo "  PASS: ${pt} verdict"
            done

            echo "  [4/4] VEX disposition (OpenVEX)..."
            gh attestation verify "${artifact}" \
              --owner "${OWNER}" \
              --signer-workflow "${VEX_SIGNER}" \
              --predicate-type "https://openvex.dev/ns/v0.2.0"
            echo "  PASS: VEX disposition"
          done

          echo ""
          echo "All attestations verified. Proceeding to publish."

  # ---------------------------------------------------------------------------
  # Publish: create a GitHub Release. GATED on verify success AND a tag ref.
  # Nothing publishes on workflow_dispatch (dry-run) or non-tag pushes.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the GitHub Release

    steps:
      - name: Download all artifacts
        # v4.3.0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cd dist
          sha256sum -- * > "${NAME}-${VERSION}-checksums.txt"
          echo "Checksums:"
          cat "${NAME}-${VERSION}-checksums.txt"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          PRERELEASE=()
          case "${GITHUB_REF_NAME}" in *-*) PRERELEASE=(--prerelease) ;; esac
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${VERSION}" \
            --generate-notes \
            "${PRERELEASE[@]}"
